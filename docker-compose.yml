services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: firstpaycheck
      POSTGRES_USER: firstpaycheck
      POSTGRES_PASSWORD: firstpaycheck
    ports:
      - "5432:5432"
    volumes:
      - firstpaycheck_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U firstpaycheck -d firstpaycheck"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg2://firstpaycheck:firstpaycheck@db:5432/firstpaycheck
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  firstpaycheck_pg:
